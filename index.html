<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Merlim - Mundo Arquiteto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="joystick">
  <div id="stick"></div>
</div>

<div id="jumpButton">▲</div>
<div id="rotateArea"></div>

<!-- ÍCONES FIXOS -->
<div id="hudIcons">
  <div class="hudIcon" id="chatIcon">🧙‍♀️</div>
  <div class="hudIcon" id="dashIcon">📊</div>
</div>

<!-- HUD CHAT -->
<div id="chatHUD">
  <div id="chatMessages"></div>
  <input type="text" id="chatInput" placeholder="Falar com Merlim..." />
</div>

<!-- HUD DASHBOARD -->
<div id="dashboardHUD">
  <div class="dashItem">Energia: <span id="energyValue">100</span>%</div>
  <div class="dashItem">Módulos: <span id="moduleCount">0</span></div>
  <div class="dashItem">Status: <span id="playerStatus">Online</span></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
